name: CI / Deploy to Fly.io

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Build & type-check (runs on every push and PR) ──────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env vars
          WEATHER_AI_API_KEY: ${{ secrets.WEATHER_AI_API_KEY || 'wai_ci_placeholder' }}
          WEATHER_AI_BASE_URL: https://api.weather-ai.co

  # ── Job 2: Deploy to Fly.io (only on push to main, after build passes) ─────
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://farmpulse.fly.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app farmpulse
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
